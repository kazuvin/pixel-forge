name: PixelForgeApp

options:
  bundleIdPrefix: com.kazuvin
  createIntermediateGroups: true
  developmentLanguage: ja
  deploymentTarget:
    iOS: "17.0"

configs:
  Debug: debug
  Developer: debug
  Release: release

packages:
  PixelCoreKit:
    path: ../../../packages/PixelCoreKit

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
  configs:
    Developer:
      SWIFT_ACTIVE_COMPILATION_CONDITIONS: $(inherited) PIXEL_FORGE_DEVELOPER

targets:
  PixelForgeApp:
    type: application
    platform: iOS
    sources:
      - path: Sources/PixelForgeApp
    dependencies:
      - package: PixelCoreKit
    info:
      path: Supporting/Info.plist
      properties:
        CFBundleDisplayName: Pixel Forge
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        LSRequiresIPhoneOS: true
        NSCameraUsageDescription: Pixel Forge uses the camera to capture a photo and convert it into pixel art on your device.
        NSPhotoLibraryAddUsageDescription: Pixel Forge saves your converted PNG images to your photo library when you choose Save to Photos.
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UILaunchScreen: {}
        UIRequiresFullScreen: true
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
    settings:
      base:
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 9H63DY247J
        PRODUCT_BUNDLE_IDENTIFIER: com.kazuvin.pixelforge
        PRODUCT_NAME: PixelForgeApp
        PRODUCT_MODULE_NAME: PixelForgeApp
        MARKETING_VERSION: 0.1.0
        CURRENT_PROJECT_VERSION: 1
        TARGETED_DEVICE_FAMILY: "1"
        SUPPORTS_MACCATALYST: NO
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: NO
        ENABLE_USER_SCRIPT_SANDBOXING: YES
        COMPRESS_PNG_FILES: NO
        STRIP_PNG_TEXT: NO

  PixelForgeAppTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests/PixelForgeAppTests
    dependencies:
      - target: PixelForgeApp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.kazuvin.pixelforge.tests
        GENERATE_INFOPLIST_FILE: YES

schemes:
  PixelForgeApp:
    build:
      targets:
        PixelForgeApp: all
        PixelForgeAppTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - PixelForgeAppTests
  PixelForgeApp-Developer:
    build:
      targets:
        PixelForgeApp: all
        PixelForgeAppTests: [test]
    run:
      config: Developer
    test:
      config: Developer
      targets:
        - PixelForgeAppTests
